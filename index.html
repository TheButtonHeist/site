    <meta
      name="description"
      content="The Button Heist is coming soon."
    />
    <title>The Button Heist</title>
    <style>
      :root {
        color: #111111;
        background: #ffffff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
